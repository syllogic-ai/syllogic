# ──────────────────────────────────────────────────────────────
# Syllogic — Railway Docker Compose
# ──────────────────────────────────────────────────────────────
#
# Drag this file onto your Railway project canvas to import all
# services. Then follow the post-import steps in the README.
#
# IMPORTANT: This file is wired for Railway Shared Variables.
# Every secret/optional value is referenced via ${{shared.VAR}}, so it is
# configured in exactly one place (the project's Shared Variables) and all
# services resolve it automatically. Derived URLs (DATABASE_URL, REDIS_URL,
# APP_URL, BACKEND_URL) are built from service references and never set by hand.
#
# For the published one-click template, the secret shared variables
# (POSTGRES_PASSWORD, BETTER_AUTH_SECRET, INTERNAL_AUTH_SECRET,
# DATA_ENCRYPTION_KEY_CURRENT) are auto-generated at deploy time via Railway's
# ${{secret()}} function — see deploy/railway/TEMPLATE.md for the exact defaults
# and the publishing workflow. When importing this compose manually, set those
# shared variables yourself once (README section 2).
#
# Release channel policy:
# - `edge` is for development/testing.
# - Published production templates should pin `vX.Y.Z` image tags.
# This v1 file keeps `edge` for backward compatibility; maintainers should pin tags before production use.
#
# What's different from the self-hosted compose:
#   - No Caddy (Railway provides reverse proxy + TLS)
#   - No uploads-init (Railway volumes are writable)
#   - No migrate service (app runs migrations before start)
#   - No depends_on (Railway deploys services independently)
#   - No container_name (Railway manages names)
#   - No bind mounts (no host filesystem on Railway)
#
# Railway-specific (baked into this compose):
#   - app PORT is pinned to 3000 (Railway proxy expects this)
#   - backend PORT is pinned to 8080 so app BACKEND_URL can reference backend.PORT
#   - App runs as root on Railway so mounted upload volumes are writable on first boot
#   - App startup command runs DB migrations before Next.js boot
# ──────────────────────────────────────────────────────────────

services:
  # ── Database ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: financeuser
      POSTGRES_PASSWORD: ${{shared.POSTGRES_PASSWORD}}
      POSTGRES_DB: finance_db
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeuser -d finance_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # ── Cache / Message Broker ────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: always

  # ── Backend API (FastAPI) ─────────────────────────────────
  backend:
    # Template maintainers: this tag is auto-bumped by CI on each vX.Y.Z release.
    image: ghcr.io/syllogic-ai/syllogic-backend:v1.0.1
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgresql://financeuser:${{shared.POSTGRES_PASSWORD}}@${{postgres.RAILWAY_PRIVATE_DOMAIN}}:5432/finance_db?sslmode=require
      REDIS_URL: redis://${{redis.RAILWAY_PRIVATE_DOMAIN}}:6379/0
      FRONTEND_URL: ${{app.RAILWAY_STATIC_URL}}
      CORS_ALLOW_ORIGINS: ${{app.RAILWAY_STATIC_URL}}
      API_DOCS_ENABLED: "false"
      INTERNAL_AUTH_SECRET: ${{shared.INTERNAL_AUTH_SECRET}}
      DATA_ENCRYPTION_KEY_CURRENT: ${{shared.DATA_ENCRYPTION_KEY_CURRENT}}
      DATA_ENCRYPTION_KEY_PREVIOUS: ${{shared.DATA_ENCRYPTION_KEY_PREVIOUS}}
      DATA_ENCRYPTION_KEY_ID: ${{shared.DATA_ENCRYPTION_KEY_ID}}
      OPENAI_API_KEY: ${{shared.OPENAI_API_KEY}}
    restart: always

  # ── MCP Server (FastMCP) ──────────────────────────────────
  # Role is selected by PROCESS_TYPE (the backend image dispatches on it),
  # so no custom start command is needed on Railway.
  mcp:
    image: ghcr.io/syllogic-ai/syllogic-backend:v1.0.1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8001/health'); sys.exit(0 if r.status==200 else 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    environment:
      NODE_ENV: production
      PROCESS_TYPE: mcp
      PORT: "8001"
      DATABASE_URL: postgresql://financeuser:${{shared.POSTGRES_PASSWORD}}@${{postgres.RAILWAY_PRIVATE_DOMAIN}}:5432/finance_db?sslmode=require
      DATA_ENCRYPTION_KEY_CURRENT: ${{shared.DATA_ENCRYPTION_KEY_CURRENT}}
      DATA_ENCRYPTION_KEY_PREVIOUS: ${{shared.DATA_ENCRYPTION_KEY_PREVIOUS}}
      DATA_ENCRYPTION_KEY_ID: ${{shared.DATA_ENCRYPTION_KEY_ID}}
      OPENAI_API_KEY: ${{shared.OPENAI_API_KEY}}
    restart: always

  # ── Celery Worker ─────────────────────────────────────────
  # PROCESS_TYPE=worker makes the backend image run the Celery worker
  # (no custom start command required on Railway).
  worker:
    image: ghcr.io/syllogic-ai/syllogic-backend:v1.0.1
    environment:
      NODE_ENV: production
      PROCESS_TYPE: worker
      DATABASE_URL: postgresql://financeuser:${{shared.POSTGRES_PASSWORD}}@${{postgres.RAILWAY_PRIVATE_DOMAIN}}:5432/finance_db?sslmode=require
      REDIS_URL: redis://${{redis.RAILWAY_PRIVATE_DOMAIN}}:6379/0
      FRONTEND_URL: ${{app.RAILWAY_STATIC_URL}}
      CORS_ALLOW_ORIGINS: ${{app.RAILWAY_STATIC_URL}}
      API_DOCS_ENABLED: "false"
      DATA_ENCRYPTION_KEY_CURRENT: ${{shared.DATA_ENCRYPTION_KEY_CURRENT}}
      DATA_ENCRYPTION_KEY_PREVIOUS: ${{shared.DATA_ENCRYPTION_KEY_PREVIOUS}}
      DATA_ENCRYPTION_KEY_ID: ${{shared.DATA_ENCRYPTION_KEY_ID}}
      OPENAI_API_KEY: ${{shared.OPENAI_API_KEY}}
    restart: always

  # ── Celery Beat (scheduler) ───────────────────────────────
  # PROCESS_TYPE=beat makes the backend image run the Celery beat scheduler
  # (no custom start command required on Railway).
  beat:
    image: ghcr.io/syllogic-ai/syllogic-backend:v1.0.1
    environment:
      NODE_ENV: production
      PROCESS_TYPE: beat
      DATABASE_URL: postgresql://financeuser:${{shared.POSTGRES_PASSWORD}}@${{postgres.RAILWAY_PRIVATE_DOMAIN}}:5432/finance_db?sslmode=require
      REDIS_URL: redis://${{redis.RAILWAY_PRIVATE_DOMAIN}}:6379/0
      FRONTEND_URL: ${{app.RAILWAY_STATIC_URL}}
      CORS_ALLOW_ORIGINS: ${{app.RAILWAY_STATIC_URL}}
      API_DOCS_ENABLED: "false"
      DATA_ENCRYPTION_KEY_CURRENT: ${{shared.DATA_ENCRYPTION_KEY_CURRENT}}
      DATA_ENCRYPTION_KEY_PREVIOUS: ${{shared.DATA_ENCRYPTION_KEY_PREVIOUS}}
      DATA_ENCRYPTION_KEY_ID: ${{shared.DATA_ENCRYPTION_KEY_ID}}
      OPENAI_API_KEY: ${{shared.OPENAI_API_KEY}}
    restart: always

  # ── Frontend (Next.js) ────────────────────────────────────
  # Migrations run automatically at startup before Next.js boot.
  # Keep PORT=3000 so Railway proxy routes traffic correctly.
  app:
    image: ghcr.io/syllogic-ai/syllogic-frontend:v1.0.1
    command: /bin/sh -lc "mkdir -p /data/uploads/profile /data/uploads/logos /data/uploads/imports /data/uploads/people && chmod -R u+rwX,g+rwX /data/uploads && node scripts/migrate.js && exec node_modules/.bin/next start -p 3000 -H 0.0.0.0"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -w /data/uploads && node -e \"require('http').get('http://127.0.0.1:3000/', (r)=>process.exit(r.statusCode && r.statusCode < 500 ? 0 : 1)).on('error', ()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    environment:
      NODE_ENV: production
      PORT: "3000"
      RAILWAY_RUN_UID: "0"
      DATABASE_URL: postgresql://financeuser:${{shared.POSTGRES_PASSWORD}}@${{postgres.RAILWAY_PRIVATE_DOMAIN}}:5432/finance_db?sslmode=require
      APP_URL: ${{app.RAILWAY_STATIC_URL}}
      BETTER_AUTH_URL: ${{app.RAILWAY_STATIC_URL}}
      NEXT_PUBLIC_BETTER_AUTH_URL: ${{app.RAILWAY_STATIC_URL}}
      MCP_SERVER_URL: ${{shared.MCP_SERVER_URL}}
      BETTER_AUTH_SECRET: ${{shared.BETTER_AUTH_SECRET}}
      INTERNAL_AUTH_SECRET: ${{shared.INTERNAL_AUTH_SECRET}}
      DATA_ENCRYPTION_KEY_CURRENT: ${{shared.DATA_ENCRYPTION_KEY_CURRENT}}
      DATA_ENCRYPTION_KEY_PREVIOUS: ${{shared.DATA_ENCRYPTION_KEY_PREVIOUS}}
      DATA_ENCRYPTION_KEY_ID: ${{shared.DATA_ENCRYPTION_KEY_ID}}
      BACKEND_URL: http://${{backend.RAILWAY_PRIVATE_DOMAIN}}:${{backend.PORT}}
      STORAGE_PROVIDER: local
      # Absolute path: files live on a persistent volume outside the build
      # output. They're served via the Next.js /uploads/* route handler
      # (frontend/app/uploads/[...slug]/route.ts), not the public/ folder.
      LOCAL_STORAGE_PATH: /data/uploads
      OPENAI_API_KEY: ${{shared.OPENAI_API_KEY}}
      LOGO_DEV_API_KEY: ${{shared.LOGO_DEV_API_KEY}}
    volumes:
      # Persistent volume for uploaded files (avatars, logos, CSVs).
      # Served via /uploads/* route handler.
      - uploads_data:/data/uploads
    restart: always

volumes:
  postgres_data:
  redis_data:
  uploads_data:
