# Railway config-as-code for the app (frontend) service.
# Used when this service is deployed from source (GitHub, template, or `railway up`).
# Configuration here overrides dashboard settings for each deployment.
#
# Note: When the app is created by importing deploy/railway/docker-compose.yml
# and uses the pre-built image (no source deploy), this file is not used — set
# the pre-deploy command once in Railway dashboard (Settings > Deploy > Pre-deploy Command).

[deploy]
# Run DB migrations before each deploy so auth (users, sessions) tables exist.
preDeployCommand = "node scripts/migrate.js"
# Uploads live on a persistent volume at /data/uploads (matches LOCAL_STORAGE_PATH,
# which must be set to /data/uploads on this service, and the self-host/Railway compose).
# Files are served via the Next.js /uploads/* route handler, not public/.
startCommand = "/bin/sh -lc \"mkdir -p /data/uploads/profile /data/uploads/logos /data/uploads/imports /data/uploads/people && chmod -R u+rwX,g+rwX /data/uploads && exec node_modules/.bin/next start -p ${PORT:-3000} -H 0.0.0.0\""
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
