# Local development/testing override:
# - Builds images from the local source instead of pulling from GHCR.
#
# Usage:
#   docker compose --env-file deploy/compose/.env \
#     -f deploy/compose/docker-compose.yml \
#     -f deploy/compose/docker-compose.local.yml \
#     up -d --build

services:
  app:
    image: syllogic-frontend:local
    pull_policy: never
    build:
      context: ../../frontend
      dockerfile: Dockerfile

  migrate:
    # Use the locally-built frontend image
    image: syllogic-frontend:local
    pull_policy: never

  backend:
    image: syllogic-backend:local
    pull_policy: never
    build:
      context: ../../backend
      dockerfile: Dockerfile
      # backend/Dockerfile's frontend-deps stage renders report newsletters
      # via `npx tsx frontend/emails/render-report.ts` and needs frontend/
      # supplied as a named BuildKit context (see backend/Dockerfile and
      # ../../docker-compose.yml for the same pattern).
      additional_contexts:
        - frontend=../../frontend

  mcp:
    # Use the locally-built backend image
    image: syllogic-backend:local
    pull_policy: never

  worker:
    # Use the locally-built backend image
    image: syllogic-backend:local
    pull_policy: never

  beat:
    # Use the locally-built backend image
    image: syllogic-backend:local
    pull_policy: never
